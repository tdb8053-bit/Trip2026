<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原鄉谷私人包車 - ✨ Gemini 旗艦行程</title>
    <!-- 載入 React 核心 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 載入 Babel 用於即時編譯 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 Font Awesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F9FAFB; margin: 0; }
        
        /* 嚴格單行化原則 - 地址與一般標籤 */
        .truncate-line { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* 景點名稱雙行原則 - 解決翻譯過長與字母下延問題 */
        .spot-title {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: visible; 
            line-height: 1.5;
            padding-bottom: 2px;
        }

        /* 頁尾/頁首標題專用 - 允許折行並保護字母下延 */
        .main-title-wrap {
            word-wrap: break-word;
            overflow: visible;
            line-height: 1.3;
            padding: 4px 0;
        }

        /* 行程連接線 */
        .bg-dotted {
            background-image: radial-gradient(#CBD5E1 1.5px, transparent 1.5px);
            background-size: 100% 10px;
        }

        /* 隱藏滾動條 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- 配置與色彩 ---
        const apiKey = ""; 
        const appId = 'yuan-xiang-gu-v38-flagship';
        const COLORS = {
            headerFooter: '#722F37', 
            gold: '#C9A063',         
            goldLight: '#D4AF37',    
            bg: '#F9FAFB',           
            red: '#E11D48',          
            blueGrey: '#94A3B8',     
        };

        // --- 雙語化資料庫 ---
        const TRIP_DATA = {
            customer: "123",
            driver: {
                name: { tw: "張其芳", en: "Mr. Chang" },
                phone: "0935-089253",
                plate: "TEB-6933",
                avatar: "https://tdb8053-bit.github.io/Trip2026/mr01.png",
                carImg: "https://tdb8053-bit.github.io/Trip2026/car01.png",
                carModel: "Mercedes-Benz Vito Tourer"
            },
            days: [
                { 
                    date: { tw: "2026/05/26 (二)", en: "May 26, 2026 (Tue)" },
                    startTime: "08:30", 
                    startHotel: { tw: "台北德立莊酒店", en: "Hotel Midado Taipei" }, 
                    fare: 7000,

                        { name: { tw: "台北德立莊酒店", en: "Hotel Midado Taipei" }, type: "start", driveTime: 110, address: "台北市中正區秀山街4號" },
                        { name: { tw: "勝興車站腳踏火車", en: "Shengxing Rail Bike" }, type: "spot", driveTime: 10, note: { tw: "已預約 11:20", en: "Reserved at 11:20" } },
                        { name: { tw: "三義金榜麵店午餐", en: "Jin Bang Noodles Lunch" }, type: "food", driveTime: 15, address: "苗栗縣三義鄉中正路170-7號" },
                        { name: { tw: "中社花市", en: "Zhongshe Flower Market" }, type: "spot", driveTime: 40 },
                        { name: { tw: "高美濕地", en: "Gaomei Wetlands" }, type: "spot", driveTime: 45, note: { tw: "準備拖鞋下去海邊玩", en: "Bring sandals for the shore" } },
                        { name: { tw: "台中住宿：金瑞文旅", en: "Stay: Gold Hotel Taichung" }, type: "hotel", address: "台中市西屯區福星路247號" }
                    ]
                },
                { 
                    date: { tw: "2026/05/27 (三)", en: "May 27, 2026 (Wed)" },
                    startTime: "09:00", 
                    startHotel: { tw: "台中金瑞文旅", en: "Gold Hotel Taichung" }, 
                    fare: 6000, 
                    spots: [
                        { name: { tw: "台中金瑞文旅", en: "Gold Hotel Taichung" }, type: "start", driveTime: 120, address: "台中市西屯區福星路247號" },
                        { name: { tw: "合歡山", en: "Hehuanshan Mountain" }, type: "spot", driveTime: 30 },
                        { name: { tw: "18怪餐廳午餐", en: "18 Monsters Restaurant" }, type: "food", driveTime: 15 },
                        { name: { tw: "清境農場", en: "Cingjing Farm" }, type: "spot", driveTime: 90 },
                        { name: { tw: "台中住宿：金瑞文旅", en: "Stay: Gold Hotel Taichung" }, type: "hotel", address: "台中市西屯區福星路247號" }
                    ]
                },
                { 
                    date: { tw: "2026/05/28 (四)", en: "May 28, 2026 (Thu)" },
                    startTime: "09:00", 
                    startHotel: { tw: "台中金瑞文旅", en: "Gold Hotel Taichung" }, 
                    fare: 7000, 
                    spots: [
                        { name: { tw: "台中金瑞文旅", en: "Gold Hotel Taichung" }, type: "start", driveTime: 60, address: "台中市西屯區福星路247號" },
                        { name: { tw: "文武廟", en: "Wenwu Temple" }, type: "spot", driveTime: 10 },
                        { name: { tw: "伊達邵老街", en: "Ita Thao Old Street" }, type: "spot", driveTime: 5 },
                        { name: { tw: "日月餐坊午餐", en: "Sun Moon Restaurant" }, type: "food", driveTime: 10 },
                        { name: { tw: "向山遊客中心", en: "Xiangshan Visitor Center" }, type: "spot", driveTime: 10 },
                        { name: { tw: "太平雲梯", en: "Taiping Suspension Bridge" }, type: "spot", driveTime: 90 },
                        { name: { tw: "太平老街", en: "Taiping Old Street" }, type: "spot", driveTime: 5 },
                        { name: { tw: "神農街", en: "Shennong Street" }, type: "spot", driveTime: 60 },
                        { name: { tw: "台南住宿：一贰一宿", en: "Stay: 121 Residence Tainan" }, type: "hotel", address: "台南市中西區海安路三段131號" }
                    ]
                },
                { 
                    date: { tw: "2026/05/29 (五)", en: "May 29, 2026 (Fri)" },
                    startTime: "09:00", 
                    startHotel: { tw: "台南一贰一宿", en: "121 Residence Tainan" }, 
                    fare: 6000, 
                    spots: [
                        { name: { tw: "台南一贰一宿", en: "121 Residence Tainan" }, type: "start", driveTime: 20, address: "台南市中西區海安路三段131號" },
                        { name: { tw: "安平古堡與老街", en: "Anping Fort & Old St" }, type: "spot", driveTime: 10 },
                        { name: { tw: "永樂市場午餐", en: "Yongle Market Lunch" }, type: "food", driveTime: 10 },
                        { name: { tw: "國華街美食巡禮", en: "Guohua Street Food" }, type: "spot", driveTime: 10 },
                        { name: { tw: "高雄住宿：明倫路", en: "Stay: Minglun Road Kaohsiung" }, type: "hotel", address: "高雄市鼓山區明倫路115號" }
                    ]
                },
                { 
                    date: { tw: "2026/05/30 (六)", en: "May 30, 2026 (Sat)" },
                    startTime: "09:00", 
                    startHotel: { tw: "高雄明倫路", en: "Kaohsiung Minglun Rd" }, 
                    fare: 5000, 
                    spots: [{ name: { tw: "高雄全日包車", en: "Kaohsiung Full Day" }, type: "spot" }, { name: { tw: "行程彈性規劃 (9小時)", en: "Flexible Itinerary (9hr)" }, type: "info" }]
                },
                { 
                    date: { tw: "2026/05/31 (日)", en: "May 31, 2026 (Sun)" },
                    startTime: "01:30", 
                    startHotel: { tw: "高雄明倫路", en: "Kaohsiung Minglun Rd" }, 
                    fare: 8000, 
                    spots: [
                        { name: { tw: "高雄起點", en: "Kaohsiung Departure" }, type: "start", driveTime: 120, address: "高雄市鼓山區明倫路115號" },
                        { name: { tw: "清水休息區", en: "Qingshui Rest Area" }, type: "spot", driveTime: 60 },
                        { name: { tw: "桃園機場 CI721", en: "TPE Airport CI721" }, type: "flight" }
                    ]
                }
            ]
        };

        const TOTAL_FARE = TRIP_DATA.days.reduce((sum, d) => sum + d.fare, 0);

        function AIModal({ isOpen, title, content, loading, onClose }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-black/70 backdrop-blur-md">
                    <div className="bg-white rounded-[2.5rem] w-full max-w-sm overflow-hidden shadow-2xl animate-fade-in border border-slate-200">
                        <div className="p-6 flex justify-between items-center text-white" style={{ backgroundColor: COLORS.blueGrey }}>
                            <div className="flex items-center gap-3">
                                <i className="fas fa-sparkles text-yellow-300 animate-pulse"></i>
                                <span className="font-bold text-xs uppercase tracking-[0.2em] truncate-line">{title}</span>
                            </div>
                            <button onClick={onClose} className="p-1 hover:opacity-50 transition-opacity"><i className="fas fa-times text-lg"></i></button>
                        </div>
                        <div className="p-8 max-h-[60vh] overflow-y-auto bg-slate-50 text-sm leading-relaxed text-slate-700 whitespace-pre-wrap font-medium">
                            {loading ? (
                                <div className="flex flex-col items-center justify-center py-12 gap-4 text-center">
                                    <div className="w-10 h-10 border-4 border-t-transparent border-slate-300 rounded-full animate-spin" style={{ borderTopColor: COLORS.blueGrey }}></div>
                                    <p className="text-slate-400 font-bold animate-pulse">AI IS SEARCHING...</p>
                                </div>
                            ) : content}
                        </div>
                        <div className="p-6 border-t bg-white flex justify-center">
                            <button onClick={onClose} className="px-12 py-3.5 rounded-full text-white font-black text-xs tracking-widest shadow-xl active:scale-95 transition-transform uppercase" style={{ backgroundColor: COLORS.gold }}>
                                OK
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [lang, setLang] = useState('tw');
            const [activeDay, setActiveDay] = useState(0);
            const [modal, setModal] = useState({ open: false, title: '', content: '', loading: false });

            const t = lang === 'tw' ? {
                customer: "預約人", phoneLabel: "電話", driverLabel: "司機", plateLabel: "車牌",
                startLoc: "今日起點", fare: "本日車資", totalFare: "六日總車資", startLabel: "出發", wish: "祝 您 旅 途 愉 快",
                btnNav: "導航", btnIntro: "介紹", btnFood: "美食", aiOutfit: "✨ AI 穿搭", aiTitle: "AI 尊榮建議", driving: "行車約", mins: "分鐘"
            } : {
                customer: "CLIENT", phoneLabel: "PHONE", driverLabel: "DRIVER", plateLabel: "PLATE",
                startLoc: "DEPARTURE", fare: "DAILY FARE", totalFare: "TOTAL FARE", startLabel: "START", wish: "WISH YOU A PLEASANT JOURNEY",
                btnNav: "NAV", btnIntro: "INFO", btnFood: "FOOD", aiOutfit: "✨ AI STYLE", aiTitle: "AI PREMIUM INSIGHT", driving: "Driving", mins: "mins"
            };

            const callGemini = async (prompt, systemBase) => {
                setModal({ open: true, title: t.aiTitle, content: "", loading: true });
                const delays = [1000, 2000, 4000];
                const systemPrompt = `${systemBase} IMPORTANT: YOU MUST RESPOND IN ${lang === 'tw' ? 'TRADITIONAL CHINESE' : 'ENGLISH'}.`;

                for (let i = 0; i < delays.length; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                tools: [{ "google_search": {} }]
                            })
                        });
                        if (!response.ok) throw new Error("Busy");
                        const data = await response.json();
                        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "No data.";
                        setModal(prev => ({ ...prev, content: text, loading: false }));
                        return;
                    } catch (e) {
                        if (i === delays.length - 1) {
                            setModal(prev => ({ 
                                ...prev, 
                                content: lang === 'tw' ? "系統忙碌，請於 5 秒後重試。" : "Busy. Retry in 5s.", 
                                loading: false 
                            }));
                        } else {
                            await new Promise(res => setTimeout(res, delays[i]));
                        }
                    }
                }
            };

            const handleAIInfo = (spotObj) => {
                const name = spotObj.tw;
                let prompt = `Provide a premium guide for "${name}". Highlight culture and luxury travel features.`;
                if (name.includes("金榜麵店")) {
                    prompt = `Detailed guide for "Jin Bang Noodles" in Miaoli. Focus on pig head meat and large portions. NO pig trotters.`;
                } else if (name.includes("金瑞文旅")) {
                    prompt = `Guide for "Gold Hotel Taichung" (金瑞文旅) at No. 247, Fuxing Rd, Xitun. It is right in the Fengjia Night Market heart. Focus on convenience in Xitun. DO NOT mention old city district.`;
                }
                callGemini(prompt, "Elite travel concierge.");
            };

            const handleAIFood = (spotObj) => {
                const name = spotObj.tw;
                let prompt = `Recommend 3 top restaurants near "${name}".`;
                if (name.includes("金瑞文旅")) {
                    prompt = `Recommend 3 premium foods in Fengjia Night Market near Gold Hotel (Fuxing Rd, Xitun District). Focus on Xitun area.`;
                }
                callGemini(prompt, "Expert food critic.");
            };

            const handleAIOutfit = () => {
                const spots = TRIP_DATA.days[activeDay].spots.map(s => s.name.tw).join(',');
                callGemini(`Analyze itinerary "${spots}" and provide outfit advice.`, "Style consultant.");
            };

            return (
                <div className="min-h-screen flex flex-col no-scrollbar">
                    {/* Header - 副標題固定中文品牌名 */}
                    <header className="w-full py-10 text-center text-white shadow-xl flex-shrink-0" style={{ backgroundColor: COLORS.headerFooter }}>
                        <h1 className="text-3xl font-serif italic tracking-[0.3em] mb-1 main-title-wrap">TAIWAN JOURNEY</h1>
                        <p className="text-[9px] tracking-[0.2em] font-bold uppercase truncate-line" style={{ color: COLORS.gold }}>
                            PREMIUM PRM PRIVATE CHARTER by 原鄉谷
                        </p>
                    </header>

                    <main className="max-w-md mx-auto px-4 -mt-6 flex-grow w-full flex flex-col gap-[10px]">
                        
                        {/* Reservation Card */}
                        <div className="bg-white rounded-3xl shadow-lg border border-slate-100 flex-shrink-0 overflow-hidden">
                            <div className="p-5 flex justify-between items-start font-bold leading-tight">
                                <div className="space-y-1 text-xs text-slate-500 min-w-0">
                                    <p className="truncate-line">{t.customer}：{TRIP_DATA.customer}</p>
                                    <p className="truncate-line font-mono">{t.phoneLabel}：{TRIP_DATA.driver.phone}</p>
                                    <p className="truncate-line opacity-50 text-[10px]">5 GUESTS</p>
                                </div>
                                <div className="text-right flex-shrink-0">
                                    <p className="text-[10px] text-amber-600 truncate-line font-black uppercase">6-Day Tour</p>
                                    <button onClick={handleAIOutfit} className="mt-2 text-[9px] font-black bg-amber-50 px-3 py-1.5 rounded-lg border border-amber-100 active:scale-95" style={{ color: COLORS.gold }}>
                                        {t.aiOutfit}
                                    </button>
                                </div>
                            </div>
                            <div className="bg-slate-50 px-5 py-2.5 border-t flex justify-between items-center text-[10px] font-bold leading-none">
                                <span className="truncate-line text-slate-400 uppercase tracking-widest">{t.startLoc}: {TRIP_DATA.days[activeDay].startHotel[lang]}</span>
                            </div>
                        </div>

                        {/* Driver Card: v30 Locked (Fixed 500px) */}
                        <section className="bg-white rounded-[2.5rem] shadow-xl p-8 h-[500px] flex flex-col items-center relative overflow-hidden border border-slate-100 flex-shrink-0">
                            
                            {/* Avatar Section: UP 10px */}
                            <div className="flex-shrink-0 z-10 pt-[10px] translate-y-[-10px]">
                                <div className="w-[110px] h-[110px] rounded-full border-4 p-1 bg-white shadow-lg" style={{ borderColor: COLORS.gold }}>
                                    <img src={TRIP_DATA.driver.avatar} className="w-full h-full object-cover rounded-full" alt="Driver" />
                                </div>
                            </div>

                            {/* Info Block: Centered & UP 12px */}
                            <div className="z-10 flex-grow w-full flex flex-col justify-center items-center translate-y-[-12px]">
                                <div className="flex flex-col gap-2.5 w-fit mb-5">
                                    <div className="grid grid-cols-[auto_1fr] gap-3 items-center">
                                        <span className="opacity-50 font-bold text-[13px] text-right w-12">{t.driverLabel}：</span>
                                        <span className="text-xl font-black text-slate-800 leading-tight pt-1 truncate-line">{TRIP_DATA.driver.name[lang]}</span>
                                    </div>
                                    <div className="grid grid-cols-[auto_1fr] gap-3 items-center">
                                        <span className="opacity-50 font-bold text-[13px] text-right w-12">{t.phoneLabel}：</span>
                                        <span className="text-base text-slate-500 font-mono font-bold leading-tight truncate-line">{TRIP_DATA.driver.phone}</span>
                                    </div>
                                    <div className="grid grid-cols-[auto_1fr] gap-3 items-center">
                                        <span className="opacity-50 font-bold text-[13px] text-right w-12">{t.plateLabel}：</span>
                                        <span className="text-base font-black tracking-widest leading-tight truncate-line" style={{ color: COLORS.red }}>{TRIP_DATA.driver.plate}</span>
                                    </div>
                                </div>
                            </div>

                            {/* Car Image: Scale 1.25x, Height 140px, MB-14 */}
                            <div className="relative w-full h-[140px] flex-shrink-0 mt-auto mb-14">
                                <div className="absolute inset-x-0 -bottom-8 -top-10 z-20 transform scale-125 pointer-events-none flex items-center justify-center">
                                    <img src={TRIP_DATA.driver.carImg} className="w-full h-full object-contain drop-shadow-2xl" alt="Car" />
                                </div>
                            </div>
                            
                            <div className="absolute bottom-6 w-full text-center z-10 px-4">
                                <p className="text-[9px] font-serif italic tracking-[0.3em] text-slate-300 uppercase leading-normal truncate-line text-center">
                                    {TRIP_DATA.driver.carModel}
                                </p>
                            </div>
                        </section>

                        {/* Day Nav */}
                        <div className="flex flex-wrap gap-[10px] flex-shrink-0">
                            {TRIP_DATA.days.map((_, idx) => (
                                <button key={idx} onClick={() => setActiveDay(idx)}
                                    className={`flex-1 min-w-[30%] py-4 rounded-2xl text-[11px] font-black transition-all shadow-md ${activeDay === idx ? 'bg-slate-500 text-white translate-y-[-1px]' : 'bg-white text-slate-400'}`}>
                                    DAY {idx + 1}
                                </button>
                            ))}
                        </div>

                        {/* Itinerary List */}
                        <div className="flex flex-col gap-[10px] pb-5">
                            <h3 className="text-2xl font-black text-slate-800 tracking-tighter px-2 mb-1 leading-tight truncate-line">
                                {TRIP_DATA.days[activeDay].date[lang]}
                            </h3>
                            {TRIP_DATA.days[activeDay].spots.map((spot, sIdx) => (
                                <React.Fragment key={sIdx}>
                                    <div className="bg-white rounded-[2.5rem] p-6 shadow-lg border-l-[10px] relative overflow-hidden flex-shrink-0" 
                                         style={{ borderColor: spot.type === 'food' ? COLORS.gold : (spot.type === 'hotel' ? '#0D9488' : COLORS.blueGrey) }}>
                                        
                                        <div className="flex justify-between items-start mb-5 gap-3">
                                            <div className="flex items-center gap-4 min-w-0">
                                                <div className="p-3 rounded-2xl bg-slate-50 shadow-sm flex-shrink-0">
                                                    <i className={`fas ${spot.type === 'food' ? 'fa-utensils' : (spot.type === 'hotel' ? 'fa-home' : 'fa-map-pin')}`} style={{ color: COLORS.blueGrey }}></i>
                                                </div>
                                                <p className="font-black text-slate-800 text-base spot-title">{spot.name[lang]}</p>
                                            </div>
                                            {spot.type === 'start' && (
                                                <div className="bg-[#E11D48] text-white px-3 py-1.5 rounded-full shadow-lg text-[10px] font-black whitespace-nowrap uppercase mt-1">
                                                    {t.startLabel} {TRIP_DATA.days[activeDay].startTime}
                                                </div>
                                            )}
                                        </div>

                                        <div className="pl-16 mb-6 flex flex-col gap-1">
                                            {spot.address && <p className="text-[9px] text-slate-400 font-bold truncate-line leading-relaxed">{spot.address}</p>}
                                            {spot.note && <p className="text-[10px] text-rose-500 font-black leading-relaxed truncate-line">{spot.note[lang] || spot.note}</p>}
                                        </div>
                                        
                                        <div className="grid grid-cols-3 gap-2 border-t pt-4">
                                            <button onClick={() => window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(spot.address || spot.name.tw)}`)}
                                                className="flex flex-col items-center gap-1.5 active:scale-90 transition-transform">
                                                <div className="p-2.5 rounded-full bg-amber-50 shadow-sm">
                                                    <i className="fas fa-location-arrow text-amber-600 text-[16px]"></i>
                                                </div>
                                                <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest truncate-line">{t.btnNav}</span>
                                            </button>
                                            <button onClick={() => handleAIInfo(spot.name)}
                                                className="flex flex-col items-center gap-1.5 active:scale-90 transition-transform">
                                                <div className="p-2.5 rounded-full bg-slate-50 shadow-sm">
                                                    <i className="fas fa-info-circle text-slate-400 text-[16px]"></i>
                                                </div>
                                                <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest truncate-line">{t.btnIntro}</span>
                                            </button>
                                            <button onClick={() => handleAIFood(spot.name)}
                                                className="flex flex-col items-center gap-1.5 active:scale-90 transition-transform">
                                                <div className="p-2.5 rounded-full bg-amber-50 shadow-sm">
                                                    <i className="fas fa-utensils text-amber-500 text-[16px]"></i>
                                                </div>
                                                <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest truncate-line">{t.btnFood}</span>
                                            </button>
                                        </div>
                                    </div>
                                    
                                    {/* 🚗 行車連接線 */}
                                    {spot.driveTime && (
                                        <div className="flex items-center gap-6 px-10 leading-none py-1">
                                            <div className="h-8 w-0.5 bg-dotted"></div>
                                            <div className="flex items-center gap-2 text-[10px] font-black text-slate-400 italic">
                                                <i className="fas fa-car-side text-rose-500 animate-pulse text-[14px]"></i>
                                                <span className="leading-relaxed truncate-line">{t.driving} {spot.driveTime} {t.mins}</span>
                                            </div>
                                        </div>
                                    )}
                                </React.Fragment>
                            ))}
                        </div>

                        {/* 車資結算 */}
                        <div className="bg-white rounded-[1.5rem] shadow-2xl border-2 border-double border-amber-200 overflow-hidden mb-24 text-center flex-shrink-0">
                            <div className="p-3 bg-amber-50/50 border-b flex justify-center gap-2 items-center leading-none">
                                <i className="fas fa-credit-card text-[10px]" style={{ color: COLORS.gold }}></i>
                                <span className="text-[9px] font-black tracking-widest text-slate-800 uppercase">Settlement</span>
                            </div>
                            <div className="p-6 space-y-4 text-center">
                                <div className="flex justify-between items-center border-b border-slate-50 pb-3">
                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest truncate-line">{t.fare}</span>
                                    <span className="text-xl font-serif font-black italic truncate-line leading-relaxed" style={{ color: COLORS.gold }}>NT$ {TRIP_DATA.days[activeDay].fare.toLocaleString()}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest truncate-line">{t.totalFare}</span>
                                    <span className="text-2xl font-serif font-black italic truncate-line leading-relaxed" style={{ color: COLORS.gold }}>NT$ {TOTAL_FARE.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* ✨ 語言切換膠囊 */}
                    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] pointer-events-none w-full max-w-[280px] px-4">
                        <button onClick={() => setLang(lang === 'tw' ? 'en' : 'tw')}
                            className="pointer-events-auto w-full bg-amber-50/90 backdrop-blur-xl border border-amber-200/60 shadow-[0_15px_45px_rgba(201,160,99,0.25)] rounded-full py-4 text-[10px] font-black tracking-widest text-amber-800 active:scale-95 transition-all leading-none uppercase flex items-center justify-center">
                            <i className="fas fa-globe mr-3 opacity-70 text-[12px]"></i>
                            {lang === 'tw' ? '繁體中文 / ENGLISH' : 'ENGLISH / 繁體中文'}
                        </button>
                    </div>

                    {/* 頁尾 - 副標題固定中文品牌名 */}
                    <footer className="w-full py-10 px-8 text-center text-white mt-auto flex-shrink-0" style={{ backgroundColor: COLORS.headerFooter }}>
                        <h4 className="text-2xl font-black tracking-[0.2em] mb-4 text-center uppercase main-title-wrap">
                            {t.wish}
                        </h4>
                        <div className="w-16 h-px bg-white/20 mx-auto mb-4"></div>
                        <p className="text-[10px] tracking-[0.15em] font-serif font-bold text-center" style={{ color: COLORS.gold }}>
                            PREMIUM PRIVATE CHARTER by 原鄉谷
                        </p>
                    </footer>

                    <AIModal 
                        isOpen={modal.open} 
                        title={modal.title} 
                        content={modal.content} 
                        loading={modal.loading} 
                        onClose={() => setModal(prev => ({ ...prev, open: false }))} 
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
