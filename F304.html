<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>原鄉谷尊榮導覽行程</title>
    <!-- 核心函式庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* 嚴格鎖定圖片容器，解決跑位問題 */
        .fixed-avatar-box { height: 128px !important; width: 128px !important; flex-shrink: 0; }
        .fixed-car-box { height: 192px !important; width: 100% !important; flex-shrink: 0; }
        .smooth-scroll { scroll-behavior: smooth; }
        
        /* 載入動畫效果 */
        .dot-pulse {
            position: relative;
            left: -9999px;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #C9A063;
            color: #C9A063;
            box-shadow: 9999px 0 0 -5px;
            animation: dot-pulse 1.5s infinite linear;
            animation-delay: .25s;
        }
        .dot-pulse::before, .dot-pulse::after {
            content: '';
            display: inline-block;
            position: absolute;
            top: 0;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #C9A063;
            color: #C9A063;
        }
        .dot-pulse::before {
            box-shadow: 9984px 0 0 -5px;
            animation: dot-pulse-before 1.5s infinite linear;
            animation-delay: 0s;
        }
        .dot-pulse::after {
            box-shadow: 10014px 0 0 -5px;
            animation: dot-pulse-after 1.5s infinite linear;
            animation-delay: .5s;
        }
        @keyframes dot-pulse-before {
            0% { box-shadow: 9984px 0 0 -5px; }
            30% { box-shadow: 9984px 0 0 2px; }
            60%, 100% { box-shadow: 9984px 0 0 -5px; }
        }
        @keyframes dot-pulse {
            0% { box-shadow: 9999px 0 0 -5px; }
            30% { box-shadow: 9999px 0 0 2px; }
            60%, 100% { box-shadow: 9999px 0 0 -5px; }
        }
        @keyframes dot-pulse-after {
            0% { box-shadow: 10014px 0 0 -5px; }
            30% { box-shadow: 10014px 0 0 2px; }
            60%, 100% { box-shadow: 10014px 0 0 -5px; }
        }
    </style>
</head>
<body class="bg-[#F3F4F6] smooth-scroll">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Gemini API 配置與指數退避重試邏輯 ---
        const apiKey = ""; 

        const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, backoff * Math.pow(2, i)));
                }
            }
        };

        // PCM16 轉 WAV 播放
        function pcmToWav(pcmBase64, sampleRate) {
            const pcmData = Uint8Array.from(atob(pcmBase64), c => c.charCodeAt(0)).buffer;
            const buffer = new ArrayBuffer(44 + pcmData.byteLength);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + pcmData.byteLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.byteLength, true);
            const pcmView = new Uint8Array(pcmData);
            const finalView = new Uint8Array(buffer);
            finalView.set(pcmView, 44);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        const App = () => {
            const [activeDay, setActiveDay] = useState(1);
            const [avatar, setAvatar] = useState(null);
            const [carView, setCarView] = useState(null);
            const itineraryRef = useRef(null);

            // AI 狀態
            const [aiWelcome, setAiWelcome] = useState("");
            const [isGeneratingWelcome, setIsGeneratingWelcome] = useState(false);
            const [aiOutfit, setAiOutfit] = useState("");
            const [isGeneratingOutfit, setIsGeneratingOutfit] = useState(false);
            const [activeFoodAi, setActiveFoodAi] = useState(null);
            const [ttsLoadingPoint, setTtsLoadingPoint] = useState(null);
            const audioRef = useRef(new Audio());

            const reservationInfo = {
                name: "陳佳君",
                phone: "+65 9877 0843",
                people: "3位大人2小孩",
                note: "尊榮包車五日方案",
                flightNo: "TR 896",
                arrivalTime: "17:05",
                arrivalDate: "2026/03/12",
                terminal: "第一航廈",
                driver: "張其芳",
                driverPhone: "0935-089253",
                carPlate: "TEB-6933"
            };

            const itineraryDays = [
                { day: 1, date: "2026年3月12日 星期四", isAirportPickup: true, points: [{ name: "桃園機場", desc: "專屬接機服務：候客中", type: "airport" }, { name: "羅東住宿", desc: "抵達飯店休息", type: "hotel" }], fare: 3000 },
                { day: 2, date: "2026年3月13日 星期五", departure: "08:30 出發 (優宿商旅)", points: [{ name: "清水地熱公園", desc: "地熱煮食、泡腳體驗", time: "50" }, { name: "稻香園", desc: "午餐推薦：在地料理", time: "30" }, { name: "奇麗灣珍奶博物館", desc: "DIY 珍珠奶茶 (13:00預約)", time: "40" }, { name: "北后寺", desc: "禪意建築參訪", time: "30" }, { name: "登篙林道", desc: "漫步林道芬多精", time: "45" }, { name: "望龍埤花田村", desc: "偶像劇美景", time: "20" }, { name: "羅東夜市", desc: "宜蘭美食探索", type: "hotel" }], fare: 4500 },
                { day: 3, date: "2026年3月14日 星期六", departure: "09:00 出發 (優宿商旅)", points: [{ name: "中華路永和豆漿", desc: "傳統中式早餐", time: "40" }, { name: "明池山莊", desc: "【高海拔提醒】溫差大請備齊保暖衣物", time: "90", highAltitude: true }, { name: "星寶體驗農場", desc: "三星蔥DIY與動物互動", time: "50" }, { name: "梅花湖", desc: "環湖騎行或散步", time: "40" }, { name: "礁溪溫泉住宿", desc: "飯店溫泉休息", type: "hotel" }], fare: 5000 },
                { day: 4, date: "2026年3月15日 星期日", departure: "09:00 出發 (品文旅礁溪)", points: [{ name: "賜福自助餐", desc: "在地早餐選擇", time: "30" }, { name: "蘭陽植物王國", desc: "豐富植被景觀", time: "40" }, { name: "百匯窯仔雞", desc: "午餐推薦：特色甕窯雞", time: "30" }, { name: "斑比山丘", desc: "梅花鹿互動體驗", time: "40" }, { name: "五峰旗瀑布", desc: "瀑布芬多精之旅", time: "45" }, { name: "礁溪夜市", desc: "在地美食巡禮", type: "hotel" }], fare: 4500 },
                { day: 5, date: "2026年3月16日 星期一", departure: "08:30 出發 (品文旅礁溪)", points: [{ name: "清珍早點", desc: "礁溪老店早餐", time: "40" }, { name: "龜山島賞鯨", desc: "海上探險 (10:00已預約)", time: "60" }, { name: "幸福36號海鮮餐廳", desc: "南方澳現撈海鮮", time: "50" }, { name: "鼻頭角步道", desc: "壯麗海景步道", time: "70" }, { name: "基隆夜市", desc: "美食探索 (18:00離開)", time: "40" }, { name: "台北路徒Plus行旅", desc: "行程結束，祝旅途愉快", type: "hotel" }], fare: 5500 }
            ];

            const totalFare = itineraryDays.reduce((sum, d) => sum + d.fare, 0);

            // ✨ AI 功能 1: 尊榮歡迎辭
            const handleGenerateWelcome = async () => {
                if (aiWelcome) return;
                setIsGeneratingWelcome(true);
                try {
                    const prompt = `你是原鄉谷包車VIP管家。貴賓是 ${reservationInfo.name}，將進行五天宜蘭行程。請寫一段 50 字內的熱情、優雅且專業的歡迎語。`;
                    const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    setAiWelcome(res.candidates?.[0]?.content?.parts?.[0]?.text || "歡迎來到台灣，祝您旅途愉快。");
                } catch (e) {
                    setAiWelcome("歡迎貴賓陳佳君，原鄉谷私人包車將竭誠為您服務，開啟這段精彩的旅程。");
                } finally {
                    setIsGeneratingWelcome(false);
                }
            };

            // ✨ AI 功能 2: 穿著與氣候建議
            const handleGenerateOutfit = async () => {
                setIsGeneratingOutfit(true);
                try {
                    const day = itineraryDays[activeDay - 1];
                    const prompt = `行程日期是 ${day.date}，景點包括 ${day.points.map(p => p.name).join(', ')}。請根據台灣三月宜蘭的氣候與景點海拔，給予具體的衣著穿搭與天氣注意事項。`;
                    const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    setAiOutfit(res.candidates?.[0]?.content?.parts?.[0]?.text);
                } catch (e) {
                    setAiOutfit("建議採用洋蔥式穿法，攜帶一件輕便外套。若前往明池，溫差較大請備齊保暖衣物。");
                } finally {
                    setIsGeneratingOutfit(false);
                }
            };

            // ✨ AI 功能 3: 即時美食推薦 (Google Search Grounding)
            const handleAiFood = async (pName) => {
                setActiveFoodAi(pName);
                try {
                    const prompt = `請幫我搜尋「${pName}」景點附近最推薦、且目前評價最高的 2 個在地美食。請列出店名、特色。`;
                    const res = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: prompt }] }],
                            tools: [{ "google_search": {} }]
                        })
                    });
                    alert(`✨ AI 精選推薦：\n\n${res.candidates?.[0]?.content?.parts?.[0]?.text}`);
                } catch (e) {
                    alert("目前連線忙碌，建議詢問您的專屬司機張先生獲得最在地推薦。");
                } finally {
                    setActiveFoodAi(null);
                }
            };

            // ✨ AI 功能 4: 語音導覽 (TTS)
            const handleAiTTS = async (pName) => {
                if (ttsLoadingPoint === pName) {
                    audioRef.current.pause();
                    setTtsLoadingPoint(null);
                    return;
                }
                setTtsLoadingPoint(pName);
                try {
                    const textRes = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `介紹「${pName}」景點的歷史背景與必看點，寫成 80 字內的口語化導覽稿。` }] }] })
                    });
                    const guideText = textRes.candidates?.[0]?.content?.parts?.[0]?.text || "這裡是一個美麗的景點。";

                    const audioRes = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `用溫柔的導遊語氣朗讀：${guideText}` }] }],
                            generationConfig: { 
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } }
                            }
                        })
                    });
                    const audioPart = audioRes.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                    if (audioPart) {
                        const sampleRate = parseInt(audioPart.mimeType.split('sampleRate=')[1]) || 24000;
                        const blob = pcmToWav(audioPart.data, sampleRate);
                        audioRef.current.src = URL.createObjectURL(blob);
                        audioRef.current.play();
                        audioRef.current.onended = () => setTtsLoadingPoint(null);
                    }
                } catch (e) {
                    setTtsLoadingPoint(null);
                }
            };

            // 圖片上傳邏輯
            const handleImage = (e, target) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const cvs = document.createElement('canvas');
                        cvs.width = img.width; cvs.height = img.height;
                        const ctx = cvs.getContext('2d');
                        ctx.clearRect(0, 0, cvs.width, cvs.height);
                        ctx.drawImage(img, 0, 0);
                        const dataUrl = cvs.toDataURL('image/png');
                        if (target === 'avatar') setAvatar(dataUrl);
                        else setCarView(dataUrl);
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const changeDay = (day) => {
                setActiveDay(day);
                setAiOutfit("");
                setTimeout(() => itineraryRef.current?.scrollIntoView({ behavior: 'smooth' }), 50);
            };

            // 導覽功能
            const openMap = (name) => window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}`);
            const openSearch = (name) => window.open(`https://www.google.com/search?q=${encodeURIComponent(name)}`);

            return (
                <div className="min-h-screen bg-[#F3F4F6] flex flex-col items-center">
                    {/* Header */}
                    <header className="bg-[#0F172A] text-white py-12 px-4 w-full text-center flex-shrink-0">
                        <h1 className="text-4xl font-black tracking-[0.4em] mb-3 uppercase leading-tight">TAIWAN JOURNEY</h1>
                        <div className="w-16 h-1 bg-[#C9A063] mx-auto mb-4"></div>
                        <p className="text-[11px] font-light tracking-widest text-[#C9A063] uppercase">
                            PREMIUM PRM PRIVATE CHARTER by 原鄉谷
                        </p>
                    </header>

                    {/* Main Content */}
                    <div className="max-w-md w-full px-4 -mt-8 space-y-6 flex-grow pb-12">
                        
                        {/* ✨ AI 尊榮歡迎辭卡片 */}
                        <section className="bg-[#0F172A] p-6 rounded-[2.5rem] shadow-2xl text-white border-b-4 border-[#C9A063]">
                            <div className="flex items-center justify-between mb-4">
                                <div className="flex items-center gap-2 text-[#C9A063] font-bold text-xs uppercase">
                                    <i data-lucide="sparkles" class="w-4 h-4"></i> AI CONCIERGE
                                </div>
                                {!aiWelcome && (
                                    <button 
                                        onClick={handleGenerateWelcome} 
                                        disabled={isGeneratingWelcome}
                                        className="bg-[#C9A063] text-[10px] px-4 py-1.5 rounded-full font-bold uppercase transition-all active:scale-95 shadow-lg"
                                    >
                                        {isGeneratingWelcome ? '載入中' : '生成歡迎辭'}
                                    </button>
                                )}
                            </div>
                            <div className="min-h-[40px] flex items-center">
                                {isGeneratingWelcome ? (
                                    <div className="dot-pulse ml-3"></div>
                                ) : (
                                    <p className="text-[11px] text-slate-300 italic leading-relaxed">
                                        {aiWelcome ? `「${aiWelcome}」` : "點擊按鈕，由專屬 AI 管家為貴賓撰寫歡迎辭..."}
                                    </p>
                                )}
                            </div>
                        </section>

                        {/* Card 1: 預約資訊 */}
                        <section className="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
                            <div className="p-8 pb-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black text-[#0F172A] border-l-4 border-[#C9A063] pl-3">預約資訊</h2>
                                    <span className="bg-[#C9A063]/10 text-[#C9A063] px-3 py-1 rounded-full text-[10px] font-bold uppercase">{reservationInfo.note}</span>
                                </div>
                                <div className="space-y-4 text-slate-700">
                                    <div className="flex items-center gap-4 border-b border-slate-50 pb-3">
                                        <div className="bg-slate-50 p-2 rounded-xl text-[#C9A063]"><i data-lucide="users" class="w-5 h-5"></i></div>
                                        <div className="flex-1 font-bold text-lg">{reservationInfo.name}</div>
                                    </div>
                                    <div className="flex items-center gap-4 border-b border-slate-50 pb-3">
                                        <div className="bg-slate-50 p-2 rounded-xl text-[#C9A063]"><i data-lucide="phone" class="w-5 h-5"></i></div>
                                        <div className="flex-1 font-bold text-lg font-serif">{reservationInfo.phone}</div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="bg-slate-50 p-2 rounded-xl text-[#C9A063]"><i data-lucide="info" class="w-5 h-5"></i></div>
                                        <div className="font-bold">人數：{reservationInfo.people}</div>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-slate-50 p-8 grid grid-cols-2 gap-y-6 border-t border-slate-100 text-slate-800">
                                <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">航班日期</p><p className="font-serif font-black">{reservationInfo.arrivalDate}</p></div>
                                <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">抵達時間</p><p className="font-serif font-black">{reservationInfo.arrivalTime}</p></div>
                                <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">航班編號</p><p className="font-serif font-black text-[#C9A063] text-lg">{reservationInfo.flightNo}</p></div>
                                <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">抵達航廈</p><p className="font-serif font-black">{reservationInfo.terminal}</p></div>
                            </div>
                        </section>

                        {/* Card 2: 司機資訊 - 嚴格固定高度 */}
                        <section className="bg-white rounded-[2.5rem] shadow-2xl p-8 text-center relative overflow-hidden">
                            <label className="mb-6 cursor-pointer inline-block group relative">
                                <div className="fixed-avatar-box rounded-full border-[3px] border-[#C9A063] p-1.5 shadow-xl overflow-hidden bg-slate-100 mx-auto flex-shrink-0">
                                    {avatar ? <img src={avatar} className="w-full h-full object-cover rounded-full" alt="司機頭像" /> : <div className="w-full h-full rounded-full flex items-center justify-center text-slate-400"><i data-lucide="camera" class="w-8 h-8"></i></div>}
                                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center rounded-full text-white text-[10px] font-bold">上傳頭像</div>
                                </div>
                                <input type="file" className="hidden" onChange={(e) => handleImage(e, 'avatar')} accept="image/*" />
                            </label>
                            <div className="space-y-1 mb-8 text-slate-900">
                                <p className="text-[15px] font-black">司機：{reservationInfo.driver} / 電話：{reservationInfo.driverPhone}</p>
                                <p className="text-[15px] font-black">車牌號碼：<span className="text-red-600 underline decoration-red-200">{reservationInfo.carPlate}</span></p>
                            </div>
                            <label className="cursor-pointer block group">
                                <div className="fixed-car-box border-[2px] border-[#C9A063] rounded-[2rem] overflow-hidden bg-white flex items-center justify-center relative shadow-inner">
                                    {carView ? <img src={carView} className="max-w-full max-h-full object-contain p-2" alt="汽車外觀" /> : <div className="text-slate-300 flex flex-col items-center gap-1"><i data-lucide="car" class="w-10 h-10"></i><p className="text-[10px] font-black uppercase tracking-widest">上傳車輛照片</p></div>}
                                </div>
                                <input type="file" className="hidden" onChange={(e) => handleImage(e, 'car')} accept="image/*" />
                            </label>
                            <p className="mt-4 text-[11px] font-serif font-black text-[#C9A063] tracking-[0.2em] uppercase leading-none">Mercedes-Benz Vito Tourer</p>
                        </section>

                        {/* Sticky Navigation */}
                        <nav className="flex justify-between gap-1 p-1 bg-white/95 backdrop-blur rounded-[1.5rem] shadow-lg sticky top-4 z-40 ring-1 ring-slate-100">
                            {[1, 2, 3, 4, 5].map((day) => (
                                <button key={day} onClick={() => changeDay(day)} className={`flex-1 py-3.5 rounded-2xl text-[11px] font-black transition-all ${activeDay === day ? 'bg-[#0F172A] text-white shadow-xl scale-105' : 'text-slate-400 hover:bg-slate-50'}`}>DAY {day}</button>
                            ))}
                        </nav>

                        {/* Itinerary Area */}
                        <div ref={itineraryRef} className="space-y-4 pt-2">
                            
                            {/* ✨ AI 穿著建議卡片 */}
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-lg border-t-2 border-[#C9A063]">
                                <div className="flex items-center justify-between mb-4">
                                    <div className="flex items-center gap-2 font-black text-xs uppercase text-[#0F172A]">
                                        <i data-lucide="sparkles" class="text-[#C9A063] w-4 h-4"></i> AI OUTFIT TIPS
                                    </div>
                                    <button 
                                        onClick={handleGenerateOutfit} 
                                        disabled={isGeneratingOutfit}
                                        className="bg-slate-50 px-3 py-1 rounded-full font-bold text-[10px] transition-all hover:bg-slate-100"
                                    >
                                        {isGeneratingOutfit ? '分析中' : '獲取建議'}
                                    </button>
                                </div>
                                <div className="min-h-[20px]">
                                    {isGeneratingOutfit ? (
                                        <div className="dot-pulse ml-3"></div>
                                    ) : (
                                        <p className="text-[11px] text-slate-600 leading-relaxed font-medium whitespace-pre-line">
                                            {aiOutfit || "點擊按鈕，讓 AI 為貴賓分析行程穿搭與氣候注意事項..."}
                                        </p>
                                    )}
                                </div>
                            </div>

                            <div className="flex items-center gap-3 px-2">
                                <div className="bg-[#C9A063] p-2 rounded-xl text-white shadow-lg"><i data-lucide="calendar" class="w-5 h-5"></i></div>
                                <h3 className="font-black text-xl text-[#0F172A]">{itineraryDays[activeDay-1].date}</h3>
                            </div>

                            {itineraryDays[activeDay-1].isAirportPickup && (
                                <div className="bg-blue-50/80 p-5 rounded-[2rem] border-l-4 border-blue-500 text-sm font-bold text-blue-900 shadow-sm leading-relaxed flex items-center gap-3">
                                    <i data-lucide="info" class="w-5 h-5 flex-shrink-0"></i>
                                    <span>司機會在降落時間加 60 分鐘。在入境大廳候客。</span>
                                </div>
                            )}

                            {itineraryDays[activeDay-1].departure && (
                                <div className="bg-slate-100 p-4 rounded-2xl flex items-center gap-2 mb-4">
                                    <i data-lucide="clock" class="text-[#C9A063] w-4 h-4"></i>
                                    <span className="text-xs font-bold italic text-slate-600">{itineraryDays[activeDay-1].departure}</span>
                                </div>
                            )}

                            <div className="space-y-1">
                                {itineraryDays[activeDay-1].points.map((p, i) => (
                                    <div key={i}>
                                        <div className={`bg-white p-6 rounded-[2.5rem] shadow-md relative group transition-all hover:shadow-xl ${p.highAltitude ? 'ring-2 ring-orange-100' : ''}`}>
                                            <div className="flex justify-between items-start">
                                                <div className="flex-1 pr-2">
                                                    <div className="flex items-center gap-2 mb-1.5 font-black text-[#0F172A] text-lg">
                                                        <i data-lucide={p.type==='hotel'?'moon':p.type==='airport'?'plane':'map-pin'} class={p.highAltitude?"text-orange-500":"text-[#C9A063]"}></i>
                                                        {p.name}
                                                    </div>
                                                    <p className={`text-xs leading-relaxed ${p.highAltitude?'text-orange-700 font-bold':'text-slate-500'}`}>{p.desc}</p>
                                                    
                                                    {p.type !== 'airport' && (
                                                        <div className="mt-4 flex flex-wrap gap-2">
                                                            <button 
                                                                onClick={() => handleAiFood(p.name)} 
                                                                disabled={activeFoodAi === p.name}
                                                                className="flex items-center gap-1.5 text-[10px] font-bold text-[#C9A063] bg-[#C9A063]/10 px-3 py-1.5 rounded-full transition-all hover:bg-[#C9A063]/20"
                                                            >
                                                                {activeFoodAi === p.name ? <i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> : <i data-lucide="sparkles" class="w-3 h-3"></i>} 
                                                                ✨ AI 美食
                                                            </button>
                                                            <button 
                                                                onClick={() => handleAiTTS(p.name)} 
                                                                className={`flex items-center gap-1.5 text-[10px] font-bold px-3 py-1.5 rounded-full transition-all ${ttsLoadingPoint === p.name ? 'bg-[#0F172A] text-white' : 'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}
                                                            >
                                                                {ttsLoadingPoint === p.name ? <i data-lucide="square" class="w-3 h-3 fill-current"></i> : <i data-lucide="volume-2" class="w-3 h-3"></i>} 
                                                                {ttsLoadingPoint === p.name ? '停止導覽' : '✨ AI 導覽'}
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                                {/* 導航與搜尋功能 */}
                                                <div className="flex flex-col gap-1.5">
                                                    <button onClick={() => openMap(p.name)} className="p-3 bg-[#0F172A] rounded-full text-white shadow-lg active:scale-90 transition-transform"><i data-lucide="map-pin" class="w-4 h-4"></i></button>
                                                    <button onClick={() => openSearch(p.name)} className="p-3 bg-slate-50 rounded-full text-slate-500 active:scale-90 transition-transform"><i data-lucide="compass" class="w-4 h-4"></i></button>
                                                </div>
                                            </div>
                                            {p.type === 'hotel' && <div className="mt-4 pt-4 border-t border-dashed text-[10px] text-blue-600 font-black uppercase tracking-widest flex items-center gap-1"><i data-lucide="moon" class="w-3 h-3"></i> Check-in / 休息 / 晚安</div>}
                                        </div>
                                        {p.time && <div className="flex justify-center items-center gap-4 py-1.5 opacity-60"><div className="h-[1px] bg-slate-200 flex-1"></div><i data-lucide="car" class="text-red-500 w-4 h-4"></i><span className="text-[9px] font-black text-slate-400">Driving: {p.time} mins</span><div className="h-[1px] bg-slate-200 flex-1"></div></div>}
                                    </div>
                                ))}
                            </div>

                            {/* Daily Fare */}
                            <div className="mt-8 bg-[#0F172A] p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden group">
                                <div className="absolute right-0 bottom-0 p-4 opacity-10 group-hover:rotate-6 transition-transform"><i data-lucide="car" class="w-24 h-24"></i></div>
                                <p className="text-[10px] text-[#C9A063] font-bold uppercase tracking-[0.3em] mb-2">Service Fare</p>
                                <p className="text-4xl font-serif font-black">{itineraryDays[activeDay-1].fare.toLocaleString()} <span className="text-[11px] text-slate-500 font-bold uppercase tracking-widest">TWD / Day</span></p>
                            </div>
                        </div>

                        {/* Total Fee Card */}
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border-2 border-[#C9A063]/30 flex justify-between items-center mt-4 transition-transform hover:scale-[1.02]">
                            <div><p className="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] mb-1">Total Package Fee</p><p className="text-xs text-slate-500 italic font-medium">包含全行程代訂與私人包車總額</p></div>
                            <div className="text-right"><p className="text-3xl font-serif font-black text-[#0F172A]">{totalFare.toLocaleString()}</p><p className="text-[10px] font-bold text-slate-400 uppercase">TWD TOTAL</p></div>
                        </div>
                    </div>

                    {/* Footer - 滿版、60%高度、單行字 */}
                    <footer className="bg-[#0F172A] text-white py-7 w-full text-center flex-shrink-0 mt-auto">
                        <p className="text-2xl font-black tracking-[0.5em] mb-2 uppercase leading-none">祝 您 旅 途 愉 快</p>
                        <p className="text-[10px] font-light tracking-[0.2em] text-[#C9A063] uppercase leading-none">
                            PREMIUM PRM PRIVATE CHARTER by 原鄉谷
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // 渲染完成後啟動 Lucide 圖示，並監聽更新
        setTimeout(() => lucide.createIcons(), 600);
        setInterval(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
