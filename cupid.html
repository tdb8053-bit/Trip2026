<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cupid Premium | Taiwan AI Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Georgia:italic@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-deep-blue: #0F172A;
            --color-gold: #C9A063;
            --color-cloud: #94A3B8;
            --color-bg: #F9FAFB;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--color-bg);
            color: #1E293B;
            -webkit-font-smoothing: antialiased;
        }
        .font-georgia { font-family: 'Georgia', serif; }
        
        /* 高級卡片美化 */
        .premium-card {
            background: white;
            border-radius: 2rem;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 膠囊按鍵強化框線 */
        .capsule-btn-primary {
            @apply rounded-full font-bold transition-all flex items-center justify-center gap-2 border-2;
            border-color: var(--color-gold);
            color: var(--color-gold);
            background: rgba(201, 160, 99, 0.03);
        }
        .capsule-btn-secondary {
            @apply rounded-full font-bold transition-all flex items-center justify-center gap-2 border-2;
            border-color: var(--color-cloud);
            color: #64748B;
            background: white;
        }
        .capsule-btn-utility {
            @apply rounded-full font-bold transition-all flex items-center justify-center gap-2 border-2;
            border-color: #E2E8F0;
            color: #94A3B8;
            background: white;
        }

        /* 尺寸固定 */
        .profile-frame { height: 150px; width: 150px; }
        .car-frame { height: 160px; width: 100%; overflow: hidden; border-radius: 1.2rem; border: 1.5px solid var(--color-gold); }
        .car-frame img { width: 100%; height: 100%; object-fit: contain; }

        .lang-active { background: #3B82F6; color: white; border-color: #3B82F6; }
        
        @keyframes subtle-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.02); }
        }
        .animate-subtle { animation: subtle-pulse 4s ease-in-out infinite; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .force-single-line {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Navigation: ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>),
            Sparkles: ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.91 5.82L20 10l-6.09 1.18L12 17l-1.91-5.82L4 10l6.09-1.18L12 3z"/></svg>),
            Camera: ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>),
            History: ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>),
            Car: ({ className }) => (<svg className={className} viewBox="0 0 24 24" fill="none" stroke="#EF4444" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="10" width="22" height="8" rx="2"/><path d="M7 10l3-6h4l3 6M5 18v2m14-2v2M9 14h6"/></svg>),
            X: ({ className, onClick }) => (<svg onClick={onClick} className={`${className} cursor-pointer`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>)
        };

        const translations = {
            zh: {
                title: "TAIWAN JOURNEY",
                sub: "PREMIUM PRM PRIVATE CHARTER by Cupid",
                cta: "開始您的邱比特之旅",
                aiSummary: "✨ 邱比特智慧精華",
                driverHeader: "📍 專屬司機：邱比特",
                driverName: "司機：戴丞鈞",
                driverPhone: "電話：0911-082120",
                plate: "車牌：RFF-1206",
                carModel: "Volkswagen T6 Caravelle",
                foodBtn: "✨ AI 美食推薦",
                historyBtn: "✨ 人文歷史",
                cameraBtn: "✨ 攝影建議",
                stay: "預計停留",
                gather: "集合時間",
                drive: "行車約",
                mins: "分鐘",
                hours: "小時",
                footerWish: "祝 您 旅 途 愉 快",
                navBtn: "即刻導覽"
            },
            en: {
                title: "TAIWAN JOURNEY",
                sub: "PREMIUM PRM PRIVATE CHARTER by Cupid",
                cta: "Start Your Cupid Journey",
                aiSummary: "✨ Cupid AI Insights",
                driverHeader: "📍 Dedicated Driver: Cupid",
                driverName: "Driver: Tai Cheng-Chun",
                driverPhone: "Tel: 0911-082120",
                plate: "Plate: RFF-1206",
                carModel: "Volkswagen T6 Caravelle",
                foodBtn: "✨ AI Food Guide",
                historyBtn: "✨ Cultural History",
                cameraBtn: "✨ Photo Tips",
                stay: "Stay Approx.",
                gather: "Meeting Time",
                drive: "Driving Approx.",
                mins: "mins",
                hours: "hours",
                footerWish: "WISH YOU A PLEASANT JOURNEY",
                navBtn: "Navigate"
            }
        };

        const App = () => {
            const [lang, setLang] = useState('zh');
            const [modal, setModal] = useState({ open: false, title: '', content: '', loading: false });
            const t = translations[lang];
            const apiKey = ""; 

            const itinerary = [
                { time: "08:30", name: lang === 'zh' ? "行程出發" : "Departure", desc: lang === 'zh' ? "司機戴先生已在指定地點等候。" : "Driver waiting at designated location.", type: "start", drive: "1 小時 10 分" },
                { time: "09:40", name: lang === 'zh' ? "文武廟" : "Wenwu Temple", desc: lang === 'zh' ? "可俯瞰日月潭優美湖景。" : "Beautiful view of Sun Moon Lake.", stay: `50 ${t.mins}`, gather: "10:30", drive: `10 ${t.mins}` },
                { time: "10:40", name: lang === 'zh' ? "向山遊客中心" : "Xiangshan", desc: lang === 'zh' ? "欣賞清水模建築。" : "Architecture appreciation.", stay: `40 ${t.mins}`, gather: "11:20", drive: `10 ${t.mins}` },
                { 
                    time: "11:30", 
                    name: lang === 'zh' ? "日月潭遊湖與用餐" : "Sun Moon Lake Boat & Dining", 
                    desc: lang === 'zh' ? "水社碼頭出發 - 玄焋寺 - 伊達邵，回到水社碼頭集合。" : "Boat tour itinerary with major stops.", 
                    stay: `4 ${t.hours}`, 
                    gather: "15:30", 
                    drive: "1 小時 40 分",
                    forceNav: "南投縣魚池鄉名勝街11號"
                },
                { time: "17:10", name: lang === 'zh' ? "高美濕地" : "Gaomei Wetlands", desc: lang === 'zh' ? "欣賞絕美夕陽。" : "Stunning sunset views.", stay: `90 ${t.mins}`, gather: "18:40", drive: `50 ${t.mins}` },
                { time: "19:30", name: lang === 'zh' ? "行程結束" : "End of Journey", desc: lang === 'zh' ? "載您返回溫馨住所。" : "Safe return back to home.", type: "end" }
            ];

            const callGemini = async (prompt, title, options = {}) => {
                const { isSearch = false } = options;
                setModal({ open: true, title, content: '', loading: true });
                try {
                    const payload = { 
                        contents: [{ parts: [{ text: prompt }] }], 
                        systemInstruction: { parts: [{ text: "你是邱比特高端隨行管家。" }] } 
                    };
                    if (isSearch) payload.tools = [{ "google_search": {} }];
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "連線中...";
                    setModal(prev => ({ ...prev, loading: false, content: text }));
                } catch (e) { setModal(prev => ({ ...prev, loading: false, content: "忙碌中。" })); }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-[#F9FAFB] relative overflow-x-hidden no-scrollbar pb-10">
                    {/* Header */}
                    <header className="bg-[#0F172A] pt-10 pb-12 px-6 text-center shadow-xl w-full">
                        <h1 className="text-white text-3xl font-bold tracking-normal mb-2 font-georgia italic uppercase force-single-line">{t.title}</h1>
                        <p className="text-[#C9A063] text-[9px] md:text-[10px] font-bold tracking-[0.2em] uppercase opacity-90 force-single-line">{t.sub}</p>
                        <div className="flex justify-center gap-3 mt-6">
                            {['zh', 'en'].map(l => (
                                <button key={l} onClick={() => setLang(l)} className={`px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest border transition-all ${lang === l ? 'bg-blue-600 border-blue-600 text-white shadow-inner' : 'text-slate-500 border-slate-700 hover:text-slate-300'}`}>{l === 'zh' ? '繁體中文' : 'ENGLISH'}</button>
                            ))}
                        </div>
                    </header>

                    {/* CTA Section */}
                    <div className="px-10 -mt-6 mb-8 relative z-10 space-y-3">
                        <button className="w-full py-3.5 border-2 border-[#C9A063] rounded-full bg-white text-[#C9A063] font-bold text-base shadow-lg">{t.cta}</button>
                        <button onClick={() => callGemini(`這是一整天的行程，請寫一段開場語。`, t.aiSummary)} className="w-full py-2.5 bg-[#0F172A] border border-[#C9A063]/40 rounded-full text-white font-bold text-xs flex items-center justify-center gap-2 shadow-md">
                            <Icons.Sparkles className="w-3.5 h-3.5 text-[#C9A063] animate-pulse" />{t.aiSummary}
                        </button>
                    </div>

                    {/* 司機卡片：恢復 150px 精確比例版 */}
                    <div className="px-6 mb-12">
                        <div className="premium-card p-6 flex flex-col items-center">
                            <div className="flex flex-col items-center w-full relative z-20">
                                {/* 大頭貼圓框：150px 尺寸，移除縮放，純正比例 */}
                                <div className="profile-frame relative mb-4 overflow-hidden rounded-full shadow-lg bg-white">
                                    <div className="absolute inset-0 border-[2.5px] border-[#C9A063] rounded-full scale-100 z-20 pointer-events-none"></div>
                                    <div className="w-full h-full bg-white">
                                        <img 
                                            src="https://tdb8053-bit.github.io/Trip2026/di00.png" 
                                            className="w-full h-full object-cover" 
                                            style={{ objectPosition: 'center center' }} 
                                            alt="司機人像" 
                                        />
                                    </div>
                                </div>
                                <div className="flex flex-col items-center justify-center text-center w-full space-y-2">
                                    <p className="text-[#C9A063] text-[9px] font-bold tracking-[0.3em] uppercase flex items-center justify-center gap-2">
                                        <span className="text-red-500 text-[10px]">📍</span> {t.driverHeader}
                                    </p>
                                    <h3 className="text-base font-bold text-slate-800 tracking-tight">{t.driverName}</h3>
                                    <p className="text-slate-400 font-georgia italic text-xs">{t.driverPhone}</p>
                                    <div className="px-6 py-1.5 bg-slate-50 rounded-full border border-slate-100 shadow-inner inline-flex items-center justify-center">
                                        <p className="text-slate-800 font-bold tracking-widest text-sm font-georgia whitespace-nowrap">{t.plate}</p>
                                    </div>
                                </div>
                            </div>
                            <div className="w-full flex flex-col items-center mt-4 pt-4 border-t border-slate-50">
                                <div className="car-frame bg-white p-1 mb-2 w-full flex items-center justify-center">
                                    <img src="https://tdb8053-bit.github.io/Trip2026/dicar00.png" alt="Vehicle" className="w-full h-full object-contain" />
                                </div>
                                <p className="text-[9px] text-slate-400 font-bold tracking-[0.2em] italic uppercase text-center font-georgia">{t.carModel}</p>
                            </div>
                        </div>
                    </div>

                    {/* 行程區域：重新植入景點行程 */}
                    <div className="px-6 space-y-6 mb-16">
                        {itinerary.map((stop, i) => (
                            <div key={i} className="relative">
                                <div className="premium-card p-6 shadow-lg z-10 relative">
                                    <div className="flex justify-between items-center mb-4">
                                        <h4 className="text-xl font-bold text-slate-800 leading-tight">{stop.name}{stop.type === 'start' && <span className="ml-2 text-red-500 text-lg">📍</span>}</h4>
                                        <span className="bg-[#94A3B8] text-white font-georgia italic text-xs font-bold px-4 py-1 rounded-xl shadow-sm">{stop.time}</span>
                                    </div>
                                    <div className="bg-slate-50/70 rounded-2xl p-4 mb-5 text-xs text-slate-600 leading-relaxed border border-slate-100/50">{stop.desc}</div>
                                    
                                    {(stop.stay || stop.gather) && (
                                        <div className="flex items-center gap-3 mb-6">
                                            <div className="flex-1 bg-blue-50/80 rounded-2xl p-3 border border-blue-100 text-center">
                                                <p className="text-[8px] text-blue-400 font-bold uppercase tracking-widest mb-0.5">{t.stay}</p>
                                                <p className="text-base font-bold text-[#0891B2] font-georgia italic">{stop.stay}</p>
                                            </div>
                                            <div className="flex-1 bg-red-50/80 rounded-2xl p-3 border border-red-100 text-center">
                                                <p className="text-[8px] text-red-400 font-bold uppercase tracking-widest mb-0.5">{t.gather}</p>
                                                <p className="text-lg font-bold text-red-600 font-georgia">{stop.gather}</p>
                                            </div>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(stop.forceNav || stop.name)}`)} className="capsule-btn-secondary py-2.5 text-[10px]"><Icons.Navigation className="w-3.5 h-3.5" />{t.navBtn}</button>
                                        <button onClick={() => callGemini(`搜尋「${stop.name}」附近最好的特色美食。`, t.foodBtn, { isSearch: true })} className="capsule-btn-primary py-2.5 text-[10px]"><Icons.Sparkles className="w-3.5 h-3.5" />{t.foodBtn}</button>
                                        <button onClick={() => callGemini(`介紹「${stop.name}」的人文歷史。`, t.historyBtn)} className="capsule-btn-utility py-2.5 text-[10px]"><Icons.History className="w-3.5 h-3.5 text-slate-300" />{t.historyBtn}</button>
                                        <button onClick={() => callGemini(`提供「${stop.name}」的美拍建議。`, t.cameraBtn)} className="capsule-btn-utility py-2.5 text-[10px]"><Icons.Camera className="w-3.5 h-3.5 text-slate-300" />{t.cameraBtn}</button>
                                    </div>
                                </div>
                                
                                {stop.drive && (
                                    <div className="flex flex-col items-center py-6 relative">
                                        <div className="bg-white px-4 py-2 rounded-full border border-slate-100 shadow-sm flex items-center gap-2 relative z-20">
                                            <Icons.Car className="w-4 h-4" /><span className="text-[9px] font-bold text-slate-500 tracking-widest uppercase font-georgia italic">{t.drive}: {stop.drive}</span>
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    {/* Footer */}
                    <footer className="bg-[#0F172A] py-12 px-8 text-center w-full shadow-2xl flex flex-col items-center justify-center">
                        <div className="mb-6 w-full flex flex-col items-center justify-center">
                            <h2 className={`text-white font-bold tracking-[0.1em] force-single-line text-center ${lang === 'zh' ? 'text-xl' : 'text-sm'}`}>
                                {t.footerWish}
                            </h2>
                            <p className="text-[#C9A063] text-[8px] font-bold tracking-[0.2em] uppercase opacity-80 force-single-line text-center mt-2">
                                {t.sub}
                            </p>
                        </div>
                    </footer>

                    {/* Modal */}
                    {modal.open && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-lg">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden">
                                <div className="bg-[#0F172A] p-5 flex justify-between items-center text-white">
                                    <h3 className="font-bold tracking-[0.1em] text-[10px] uppercase">{modal.title}</h3>
                                    <button onClick={() => setModal({ ...modal, open: false })}><Icons.X className="w-5 h-5 text-white/70" /></button>
                                </div>
                                <div className="p-8 max-h-[50vh] overflow-y-auto no-scrollbar text-sm text-slate-700 leading-relaxed whitespace-pre-line italic">
                                    {modal.loading ? "邱比特管家正在規劃中..." : modal.content}
                                </div>
                                <div className="p-4 bg-slate-50 text-center border-t border-slate-100"><button onClick={() => setModal({ ...modal, open: false })} className="text-[10px] font-bold text-[#94A3B8] uppercase tracking-[0.2em]">Dismiss Window</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
